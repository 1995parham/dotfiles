# ============================================================================
# FONT CONFIGURATION
# ============================================================================
# Kitty has very powerful font management. You can configure individual font
# faces and even specify special fonts for particular characters.
#
# Mirrors the WezTerm font block (wezterm/wezterm.lua): Maple Mono NF, a warm,
# rounded face with ligatures and Nerd Font glyphs baked in, so tab/status
# icons render natively instead of via a fallback font. Base weight is Medium,
# kept light/small per preference.
#
# features="..." replaces kitty's default OpenType features for that face, so
# the ligature features (liga/clig/calt) and kern are re-listed here to keep
# Maple Mono's ligatures working (same reason WezTerm re-lists harfbuzz_features).
# cv04=1 selects the alternate `l` with a left bottom bar (Consolas-style foot)
# so it's unmistakable next to `1`/`I`.

# Font family for regular text
font_family      family="Maple Mono NF" style=Medium features="+liga +clig +calt +kern cv04=1"

# Font family for bold text
bold_font        family="Maple Mono NF" style=Bold features="+liga +clig +calt +kern cv04=1"

# Font family for italic text
italic_font      family="Maple Mono NF" style="Medium Italic" features="+liga +clig +calt +kern cv04=1"

# Font family for bold+italic text
bold_italic_font family="Maple Mono NF" style="Bold Italic" features="+liga +clig +calt +kern cv04=1"

# Font size in pts (matches WezTerm's font_size 10)
font_size 10

# Adjust text rendering for better readability
disable_ligatures never
text_composition_strategy platform

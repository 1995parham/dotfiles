---
session_name: Hatchup IO
windows:
    - window_name: scratch 📝
      layout: tiled
      start_directory: ~/Downloads
      focus: true
      panes:
          - shell_command:
                - chafa $DOTFILES_ROOT/companies/hatchup-io.png --size 80 --clear -f symbols | less
          - focus: true
          - pane
          - pane

    - window_name: production 🚀
      layout: tiled
      start_directory: ~/Documents/Git/hatchup/hatchup-io/production
      panes:
          - pane
          - pane
          - pane
          - shell_command:
                - nvim
            focus: true


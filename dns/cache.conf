# Cache tuning
cache-size=10000
min-cache-ttl=300
neg-ttl=10

# Query all upstream servers in parallel, use fastest response
all-servers

# Raise concurrent forwarded query limit (default 150)
dns-forward-max=1000

# Allow localhost responses (dev tools like mkcert, local k8s, etc.)
rebind-localhost-ok

# Log cache statistics on SIGUSR1 (kill -USR1 <pid>)
log-facility=/var/log/dnsmasq.log

# Zi-tel (home network only)
server=172.20.11.11
server=172.20.11.12
# Cloudflare
server=1.1.1.1
server=1.0.0.1
# Google
server=8.8.8.8
server=8.8.4.4
# Quad9
server=9.9.9.9
